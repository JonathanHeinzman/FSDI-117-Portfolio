{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    {% block css %} 
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    {% endblock %}
    <title>{% block title %} My portfolio {% endblock %}</title>
</head>
<body class="d-flex flex-column">
    <header>
        <nav class="navbar navbar-expand-sm bg-secondary navbar-dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="#"></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav mx-auto">
                        <li class="nav-item mx-3">
                            <a class="nav-link {% if 'about_me' in request.path %}active{% endif %}"  {% if 'about_me' in request.path %}aria-current="page"{% endif %} href="{% url 'about_me'%}">About Me</a>
                        </li>
                        <li class="nav-item mx-3">
                            <a class="nav-link {% if 'experience' in request.path %}active{% endif %}"  {% if 'experience' in request.path %}aria-current="page"{% endif %} href="{% url 'experience' %}">Experience</a>
                        </li>
                        <li class="nav-item mx-3">
                            <a class="nav-link {% if 'projects' in request.path %}active{% endif %}"  {% if 'projects' in request.path %}aria-current="page"{% endif %} href="{% url 'projects_list' %}">Projects</a>
                        </li>
                        <li class="nav-item mx-3">
                            <a class="nav-link {% if 'about_me' in request.path %}active{% endif %}"  {% if 'contact_me' in request.path %}aria-current="page"{% endif %} href="{% url 'contact_me'%}">Contact Me</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

    </header>
    
    <main class="flex-grow-1">
        {% block content %}
            
        {% endblock %}
    </main>

    <footer class="mt-5">
        <nav class="navbar fixed-bottom navbar-expand-sm bg-secondary navbar-dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">Jonathan Heinzman</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav mx-auto pe-5">
                        <li class="nav-item me-4">
                            <a class="nav-link {% if 'about_me' in request.path %}active{% endif %}"  {% if 'about_me' in request.path %}aria-current="page"{% endif %} href="{% url 'about_me'%}">About Me</a>
                        </li>
                        <li class="nav-item me-4">
                            <a class="nav-link {% if 'experience' in request.path %}active{% endif %}"  {% if 'experience' in request.path %}aria-current="page"{% endif %} href="{% url 'experience' %}">Experience</a>
                        </li>
                        <li class="nav-item me-4">
                            <a class="nav-link {% if 'projects' in request.path %}active{% endif %}"  {% if 'projects' in request.path %}aria-current="page"{% endif %} href="{% url 'projects_list' %}">Projects</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
